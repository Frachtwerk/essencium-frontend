    notes: "BREAKING. Replaces i18next + react-i18next + next-i18n-router stack entirely. All components using useTranslation() must switch to useTranslations() from next-intl. Server-side translation loading restructured around getTranslations()/getMessages(). See MIGRATION.md for per-file details."
