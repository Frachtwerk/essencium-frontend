  # Bug fix: z-index for notifications
  - type: file_tracking
    description: "Add z-index 100 to notification style to fix overlay issues"
    files:
      - path: "src/utils/withBaseStylingShowNotification.ts"
        action: modified
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/568"

  # Bug fix: load all users for filter
  - type: file_tracking
    description: "Add separate API call to load all users for filter select data instead of using paginated data"
    files:
      - path: "src/pages/users/index.tsx"
        action: modified
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/578"

  # Bug fix: highlight parent navLink on child routes
  - type: file_tracking
    description: "Fix highlighting of parent NavLink when on child routes"
    files:
      - path: "src/components/layouts/AuthLayout.tsx"
        action: modified

  # Refactor: AppShell and NavBar layout
  - type: file_tracking
    description: "Refactor Mantine AppShell layout: use useDisclosure for mobile navbar toggle, set navbar width in AppShell, remove getSidebarMargin helper, remove Box wrapper from AppShellMain, pass isMobile prop to NavBar"
    files:
      - path: "src/components/layouts/AuthLayout.tsx"
        action: modified
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/574"

  # Refactor: CSS classes and styles
  - type: file_tracking
    description: "Refactor CSS class naming from BEM double-dash to BEM double-underscore convention, move inline Card shadow/radius styles to CSS modules"
    files:
      - path: "src/pages/login/Login.module.css"
        action: modified
      - path: "src/pages/login/index.tsx"
        action: modified
      - path: "src/pages/users/[id].tsx"
        action: modified
      - path: "src/pages/users/add/AddUserView.module.css"
        action: modified
      - path: "src/pages/users/add/index.tsx"
        action: modified
      - path: "src/pages/users/users.module.css"
        action: modified
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/566"

  # New CSS module files
  - type: new_file
    description: "Add Profile.module.css for profile page styles"
    path: "src/pages/profile/Profile.module.css"
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/566"

  - type: new_file
    description: "Add SetPassword.module.css for set-password page styles"
    path: "src/pages/set-password/SetPassword.module.css"
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/566"

  # Refactor: move inline styles to CSS modules for profile and set-password
  - type: file_tracking
    description: "Replace inline Mantine style props with CSS module classes in profile and set-password views"
    files:
      - path: "src/pages/profile/index.tsx"
        action: modified
      - path: "src/pages/set-password/index.tsx"
        action: modified
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/566"

