version: "7.9.1"
from: "7.9.0"
date: "2025-01-16"

changes:
  # Remove handleRefetch prop from TablePagination usage
  - type: file_tracking
    description: "Remove handleRefetch prop from TablePagination in all admin views to fix duplicate requests"
    files:
      - path: "src/app/[locale]/(main)/admin/rights/RightsView.tsx"
        action: modified
      - path: "src/app/[locale]/(main)/admin/roles/RolesView.tsx"
        action: modified
      - path: "src/app/[locale]/(main)/admin/users/UsersView.tsx"
        action: modified
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/713"
    notes: "handleRefetch prop was removed from TablePagination component. All references must be updated by removing the handler prop."

