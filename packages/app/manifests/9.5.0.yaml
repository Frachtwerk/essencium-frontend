version: "9.5.0"
from: "9.4.5"
date: "2026-03-10"

changes:
  # ── Infrastructure: React Compiler ─────────────────────────────────
  - type: infrastructure
    description: "Enable React Compiler via next.config.js `reactCompiler: true`. Tables using TanStack Table need `'use no memo'` directive due to compatibility issues (see https://github.com/TanStack/table/issues/5567)."
    files:
      - path: "next.config.js"
        action: modified
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/908"

  # ── Infrastructure: ESLint flat config migration ───────────────────
  - type: infrastructure
    description: "Migrate from legacy .eslintrc.json to ESLint 9 flat config (eslint.config.mjs). Lint script changed from `next lint` to `eslint .`."
    files:
      - path: "eslint.config.mjs"
        action: added
      - path: "package.json"
        action: modified
    pr: "https://github.com/Frachtwerk/essencium-frontend/pull/941"

  # ── Infrastructure: TypeScript moduleResolution ────────────────────
  - type: infrastructure
    description: "Change TypeScript moduleResolution from 'node' to 'bundler' in tsconfig.base.json and misc/tsconfig.app.json for Next.js 16 compatibility."
    files:
      - path: "tsconfig.base.json"
        action: modified
      - path: "misc/tsconfig.app.json"
        action: modified

