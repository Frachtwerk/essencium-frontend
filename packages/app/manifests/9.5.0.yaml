  - type: dependency_migration
    package: "next"
    from: "15.4.7"
    to: "16.1.6"
    scope: project_wide
    reference: "https://nextjs.org/blog/next-16"
    notes: "Major version upgrade. Middleware renamed to proxy, React Compiler support built-in, output 'standalone' path changed to `/.next/standalone/frontend`."

  - type: dependency_migration
    package: "react"
    from: "19.0.0"
    to: "19.2.0"
    scope: project_wide
    reference: "https://github.com/facebook/react/releases"
    notes: "React 19.2 required for React Compiler support."

